name: Contract Validation

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
      - "release-*"

jobs:
  contract-validation:
    name: Validate contract registry
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install contract validation dependencies
        run: python -m pip install --disable-pip-version-check pytest==9.0.3 jsonschema==4.26.0

      - name: Run contract tests
        run: python -m pytest tests/contracts -v

      - name: Run standalone contract validator
        run: python scripts/validate_contracts.py
